services:
  - type: web
    name: evodoc-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: CACHE_BACKEND
        value: memory
      - key: LOG_LEVEL
        value: INFO